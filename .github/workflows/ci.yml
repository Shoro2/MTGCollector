name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
        env:
          GOOGLE_CLIENT_ID: ''
          GOOGLE_CLIENT_SECRET: ''
          ORIGIN: http://localhost:5173
